name: iPhone Demo Web Link

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build_web:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    outputs:
      pages_available: ${{ steps.pages_availability.outputs.available }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Build web app
        shell: bash
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            BASE_HREF="/"
          else
            BASE_HREF="/$REPO_NAME/"
          fi

          echo "Using base href: $BASE_HREF"
          flutter build web --release --base-href "$BASE_HREF"

      - name: Check or enable Pages
        id: pages_availability
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PAGES_ENABLEMENT_TOKEN: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}
        run: |
          set -euo pipefail

          PAGES_API="https://api.github.com/repos/${{ github.repository }}/pages"
          API_VERSION="X-GitHub-Api-Version: 2022-11-28"

          check_pages_status() {
            curl -sS -o "$RUNNER_TEMP/pages-response.json" -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "$API_VERSION" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              "$PAGES_API"
          }

          status="$(check_pages_status)"

          if [ "$status" = "200" ]; then
            echo "GitHub Pages is already enabled."
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$status" = "404" ] && [ -n "${PAGES_ENABLEMENT_TOKEN:-}" ]; then
            echo "GitHub Pages is not enabled yet. Trying to enable it with PAGES_ENABLEMENT_TOKEN..."

            create_status="$(curl -sS -o "$RUNNER_TEMP/pages-create-response.json" -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "$API_VERSION" \
              -H "Authorization: Bearer $PAGES_ENABLEMENT_TOKEN" \
              "$PAGES_API" \
              --data '{"build_type":"workflow","source":{"branch":"main","path":"/"}}')"

            if [ "$create_status" = "201" ] || [ "$create_status" = "409" ]; then
              echo "GitHub Pages enablement request accepted."
              echo "available=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "::warning::Failed to enable GitHub Pages automatically (HTTP $create_status)."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::GitHub Pages is not enabled for this repository (HTTP $status)."
          echo "::warning::Enable Pages in Settings > Pages and choose GitHub Actions, or add PAGES_ENABLEMENT_TOKEN secret with repo/admin permission."
          echo "available=false" >> "$GITHUB_OUTPUT"

      - name: Setup Pages
        if: steps.pages_availability.outputs.available == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.pages_availability.outputs.available == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy_web:
    name: Deploy to GitHub Pages
    needs: build_web
    if: needs.build_web.outputs.pages_available == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
