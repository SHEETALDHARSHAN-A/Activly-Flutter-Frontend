name: Mobile Demo Builds

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: Version name (for example 1.0.0)
        required: true
        default: "1.0.0"
      build_number:
        description: Build number (for example 1)
        required: true
        default: "1"
      ios_export_method:
        description: iOS export method
        required: true
        type: choice
        default: ad-hoc
        options:
          - ad-hoc
          - app-store
          - development
          - enterprise

permissions:
  contents: read

jobs:
  android_apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name "${{ inputs.build_name }}" \
            --build-number "${{ inputs.build_number }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  ios_ipa:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: android_apk
    env:
      IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
      IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Validate iOS signing secrets
        shell: bash
        run: |
          missing=0
          for key in IOS_CERTIFICATE_P12_BASE64 IOS_CERTIFICATE_PASSWORD IOS_PROVISION_PROFILE_BASE64 IOS_KEYCHAIN_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required repository secret: ${key}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install iOS signing assets
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/signing-cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$IOS_CERTIFICATE_P12_BASE64" | base64 -D -o "$CERT_PATH"
          echo -n "$IOS_PROVISION_PROFILE_BASE64" | base64 -D -o "$PROFILE_PATH"

          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles"

      - name: Get dependencies
        run: flutter pub get

      - name: Build signed iOS IPA
        shell: bash
        run: |
          flutter build ipa \
            --build-name "${{ inputs.build_name }}" \
            --build-number "${{ inputs.build_number }}" \
            --export-method "${{ inputs.ios_export_method }}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Cleanup keychain
        if: always()
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security delete-keychain "$KEYCHAIN_PATH" || true